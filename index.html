<style>
  :root{
    --bg: #050506;
    --panel: rgba(255,255,255,0.03);
    --panel-solid: #101012;
    --line: rgba(255,255,255,0.09);
    --text: #ece9e4;
    --text-dim: #75757a;
    --accent: #3ddc84;
    --accent-2: #e8c15a;
    --gradient: linear-gradient(120deg, var(--accent), var(--accent-2));
    --ease: cubic-bezier(.22,1,.36,1);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ overflow-x:hidden; scroll-behavior:smooth; }
  body{
    overflow-x:hidden;
    background-color:var(--bg);
    background-image:
      radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(232,193,90,0.10), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(126,232,201,0.07), transparent 60%);
    background-size:28px 28px, auto, auto;
    background-repeat:repeat, no-repeat, no-repeat;
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,.pixel{ font-family:'JetBrains Mono', monospace; font-weight:700; letter-spacing:0.02em; }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--accent); color:#0a0a0b; }
  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-track{ background:var(--bg); }
  ::-webkit-scrollbar-thumb{ background:#2a2a2e; border-radius:6px; border:2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover{ background:#3a3a3f; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:3px; border-radius:4px; }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .reveal{ animation:fadeUp .7s var(--ease) both; }
  @media (prefers-reduced-motion: reduce){ .reveal{ animation:none; } }

  .layout{
    width:100%;
    min-height:100vh;
    display:grid;
    grid-template-columns:340px 1fr;
    gap:28px;
    padding:32px;
  }
  .sidebar, .content{ min-width:0; }

  /* ---------------- SIDEBAR ---------------- */
  .sidebar{ display:flex; flex-direction:column; }

  .avatar{
    width:150px; height:150px;
    border-radius:12px;
    padding:2px;
    background:var(--gradient);
    animation-delay:.05s;
  }
  .avatar-inner{
    width:100%; height:100%;
    border-radius:10px;
    overflow:hidden;
    background:#141416;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .avatar-inner img{ width:100%; height:100%; object-fit:cover; display:block; }
  .avatar-inner .ph{ color:var(--text-dim); font-size:11px; letter-spacing:0.08em; }

  .identity{ animation-delay:.12s; }
  .identity h1{
    margin-top:26px; font-size:30px;
    font-family:'Fira Code', monospace; font-weight:600;
    background:linear-gradient(100deg,#fff 30%, var(--accent) 70%, var(--accent-2));
    background-size:200% auto;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:shine 6s linear infinite;
  }
  @keyframes shine{
    to{ background-position:200% center; }
  }
  @media (prefers-reduced-motion: reduce){ .identity h1{ animation:none; } }

  .role{ margin-top:14px; color:var(--text); font-size:14px; font-family:'Fira Code', monospace; }
  .tagline{ margin-top:10px; color:var(--accent-2); font-family:'Fira Code', monospace; font-size:14px; }

  .sidebar-bottom{ margin-top:auto; display:flex; flex-direction:column; gap:12px; animation-delay:.2s; }

  .now-playing{
    display:flex; align-items:center; gap:12px;
    background:linear-gradient(160deg, var(--panel-solid), #0b0b0d);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    position:relative;
    overflow:hidden;
    transition:border-color .25s var(--ease);
  }
  .now-playing:hover{ border-color:rgba(232,193,90,0.35); }
  .now-playing .art{
    width:40px; height:40px; border-radius:8px; overflow:hidden; flex-shrink:0;
    background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:15px;
    box-shadow:0 4px 14px rgba(61,220,132,0.3);
  }
  .now-playing .art img{ width:100%; height:100%; object-fit:cover; display:block; }
  .now-playing .lines{ display:flex; flex-direction:column; gap:2px; min-width:0; flex:1; }
  .now-playing .t1{ font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .now-playing .t2{ font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .now-playing .bar{ margin-top:6px; height:3px; background:#232326; border-radius:2px; overflow:hidden; }
  .now-playing .bar-fill{ height:100%; width:0%; background:var(--gradient); transition:width .8s linear; }
  .now-playing .times{ display:flex; justify-content:space-between; font-size:10px; color:var(--text-dim); margin-top:3px; }

  .social-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .social-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 8px; border-radius:10px; font-size:13px; font-weight:600;
    border:1px solid var(--line);
    position:relative; overflow:hidden;
    transition:transform .25s var(--ease), box-shadow .25s var(--ease), filter .2s ease;
  }
  .social-btn:hover{ transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,0.4); filter:brightness(1.12); }
  .social-btn:active{ transform:translateY(-1px); }
  .social-btn svg{ width:16px; height:16px; flex-shrink:0; display:block; }
  .social-btn.github{ background:#1a1a1c; }
  .social-btn.telegram{ background:#229ed9; color:#fff; border-color:#229ed9; }
  .social-btn.instagram{ background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af); color:#fff; border:none; }

  /* ---------------- RIGHT COLUMN ---------------- */
  .content{ display:flex; flex-direction:column; gap:24px; }

  .panel{
    background:var(--panel);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    transition:border-color .3s var(--ease), box-shadow .3s var(--ease);
  }
  .panel:hover{ border-color:rgba(255,255,255,0.16); box-shadow:0 20px 50px rgba(0,0,0,0.35); }

  .panel-head{ text-align:center; padding:22px 0 12px; }
  .panel-head h2{ font-size:15px; letter-spacing:0.08em; color:var(--text); }
  .panel-head .underline{
    width:36px; height:2px; margin:10px auto 0;
    background:var(--gradient); border-radius:2px;
    transform-origin:center;
  }

  .marquee{ overflow:hidden; white-space:nowrap; border-top:1px solid var(--line); padding:20px 0; width:100%;
    -webkit-mask-image:linear-gradient(90deg, transparent, black 6%, black 94%, transparent);
            mask-image:linear-gradient(90deg, transparent, black 6%, black 94%, transparent);
  }
  .marquee-track{ display:inline-flex; gap:12px; padding:0 16px; animation:scroll 32s linear infinite; }
  .marquee-track.paused{ animation-play-state:paused; }
  @keyframes scroll{ from{ transform:translateX(0); } to{ transform:translateX(-50%); } }
  @media (prefers-reduced-motion: reduce){ .marquee-track{ animation:none; } }

  .badge{
    display:inline-flex; align-items:center; gap:10px;
    padding:11px 18px;
    background:linear-gradient(160deg,#191919,#131315);
    border:1px solid var(--line); border-radius:10px;
    font-size:14px; font-weight:600; color:var(--text);
    white-space:nowrap;
    transition:border-color .2s var(--ease), box-shadow .25s var(--ease), transform .25s var(--ease), background .2s ease;
  }
  .badge img{ width:20px; height:20px; flex-shrink:0; display:block; transition:filter .2s ease; }
  .badge.dim{ color:var(--text-dim); }
  .badge.dim img{ filter:grayscale(1) brightness(1.6) opacity(0.4); }
  .badge.active{
    border-color:var(--accent-2);
    box-shadow:0 0 0 1px rgba(232,193,90,0.35), 0 8px 22px rgba(232,193,90,0.18);
    transform:translateY(-3px) scale(1.03);
    background:linear-gradient(160deg,#241f14,#161310);
    color:var(--text);
  }
  .badge.active.dim img{ filter:grayscale(1) brightness(2); }

  /* ---------------- PROJECTS ---------------- */
  .projects-panel .panel-body{ padding:8px 20px 20px; display:flex; flex-direction:column; gap:12px; }
  .project-card{
    display:block;
    background:linear-gradient(160deg,#171719,#121214);
    border:1px solid var(--line); border-radius:12px;
    padding:18px 20px;
    position:relative;
    overflow:hidden;
    transition:border-color .25s var(--ease), transform .25s var(--ease), box-shadow .25s var(--ease);
  }
  .project-card::before{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(280px 120px at var(--mx,0px) var(--my,0px), rgba(232,193,90,0.14), transparent 70%);
    opacity:0; transition:opacity .3s ease;
    pointer-events:none;
  }
  .project-card:hover::before{ opacity:1; }
  .project-card:hover{
    border-color:var(--accent-2);
    transform:translateX(3px);
    box-shadow:0 16px 34px rgba(0,0,0,0.35);
  }
  .project-card .row{ display:flex; align-items:center; justify-content:space-between; gap:12px; position:relative; z-index:1; }
  .project-card h3{ font-size:16px; font-weight:700; color:#fff; font-family:'JetBrains Mono', monospace; }
  .project-card .arrow{ color:var(--text-dim); transition:transform .25s var(--ease), color .2s ease; font-size:14px; }
  .project-card:hover .arrow{ transform:translateX(5px); color:var(--accent-2); }
  .project-tags{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; position:relative; z-index:1; }
  .project-tags span{
    display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:6px 12px;
    border-radius:7px; background:#1e1e21; border:1px solid var(--line); color:var(--text);
    transition:border-color .2s ease, color .2s ease;
  }
  .project-card:hover .project-tags span{ border-color:rgba(232,193,90,0.4); }

  @media (max-width:860px){
    .layout{ grid-template-columns:1fr; padding:20px; }
  }
</style>
</head>

  function renderTrack(elId, items, hasActiveFlag){
    const el = document.getElementById(elId);
    const build = () => items.map(it => {
      const dimClass = hasActiveFlag && !it.active ? ' dim' : '';
      return `<span class="badge${dimClass}"><img src="${it.icon}" alt="">${it.name}</span>`;
    }).join('');
    el.innerHTML = build() + build();
  }
  renderTrack('langTrack', languages, true);
  renderTrack('toolTrack', tools, false);

  const supportsHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  if(supportsHover){
    document.querySelectorAll('[data-track]').forEach(function(track){
      track.querySelectorAll('.badge').forEach(function(badge){
        badge.addEventListener('mouseenter', function(){
          track.classList.add('paused');
          badge.classList.add('active');
        });
        badge.addEventListener('mouseleave', function(){
          track.classList.remove('paused');
          badge.classList.remove('active');
        });
      });
    });
  }

  // курсор-подсветка на карточках проектов
  document.querySelectorAll('.project-card').forEach(function(card){
    card.addEventListener('mousemove', function(e){
      const rect = card.getBoundingClientRect();
      card.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
      card.style.setProperty('--my', (e.clientY - rect.top) + 'px');
    });
  });

  // ---------- Discord / Spotify через Lanyard ----------
  const DISCORD_ID = "761549902680424448";

  function fmtTime(ms){
    const totalSec = Math.max(0, Math.floor(ms/1000));
    const m = Math.floor(totalSec/60);
    const s = totalSec%60;
    return m + ":" + String(s).padStart(2,'0');
  }

  function resolveActivityImage(activity){
    const raw = activity.assets && activity.assets.large_image;
    if(!raw) return null;
    if(raw.startsWith('mp:external/')){
      return 'https://media.discordapp.net/external/' + raw.replace('mp:external/', '');
    }
    if(raw.startsWith('spotify:')){
      return 'https://i.scdn.co/image/' + raw.replace('spotify:', '');
    }
    if(activity.application_id){
      return `https://cdn.discordapp.com/app-assets/${activity.application_id}/${raw}.png`;
    }
    return null;
  }

  async function updateSpotify(){
    const titleEl = document.getElementById('npTitle');
    const artistEl = document.getElementById('npArtist');
    const artEl = document.getElementById('npArt');
    const barWrap = document.getElementById('npBarWrap');
    const bar = document.getElementById('npBar');
    const timesEl = document.getElementById('npTimes');
    const elapsedEl = document.getElementById('npElapsed');
    const durationEl = document.getElementById('npDuration');

    try{
      const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      const json = await res.json();
      if(!json.success) throw new Error('lanyard error');
      const data = json.data;

      // 1) официальная интеграция Spotify в Discord
      let np = null;
      if(data.spotify){
        np = {
          title: data.spotify.song,
          subtitle: data.spotify.artist,
          image: data.spotify.album_art_url,
          start: data.spotify.timestamps && data.spotify.timestamps.start,
          end: data.spotify.timestamps && data.spotify.timestamps.end
        };
      } else {
        // 2) любая "Listening to ..." активность — Music Presence, YouTube Music и т.п.
        const listening = (data.activities || []).find(a => a.type === 2);
        if(listening){
          np = {
            title: listening.details || listening.name || 'Слушаю музыку',
            subtitle: listening.state || listening.name || '',
            image: resolveActivityImage(listening),
            start: listening.timestamps && listening.timestamps.start,
            end: listening.timestamps && listening.timestamps.end
          };
        }
      }

      if(np){
        titleEl.textContent = np.title;
        artistEl.textContent = np.subtitle;
        if(np.image){
          artEl.innerHTML = `<img src="${np.image}" alt="">`;
          artEl.style.background = 'transparent';
        } else {
          artEl.innerHTML = '♪';
          artEl.style.background = 'var(--accent)';
        }

        if(np.start && np.end){
          const now = Date.now();
          const dur = np.end - np.start;
          const elapsed = Math.min(dur, Math.max(0, now - np.start));
          barWrap.style.display = 'block';
          timesEl.style.display = 'flex';
          bar.style.width = (elapsed/dur*100) + '%';
          elapsedEl.textContent = fmtTime(elapsed);
          durationEl.textContent = fmtTime(dur);
        } else {
          barWrap.style.display = 'none';
          timesEl.style.display = 'none';
        }
      } else {
        titleEl.textContent = 'Не слушаю';
        artistEl.textContent = 'Ничего не играет';
        artEl.innerHTML = '♪';
        artEl.style.background = 'var(--accent)';
        barWrap.style.display = 'none';
        timesEl.style.display = 'none';
      }
    }catch(e){
      titleEl.textContent = 'Не слушаю';
      artistEl.textContent = 'Ничего не играет';
    }
  }

  updateSpotify();
  setInterval(updateSpotify, 15000);
</script>
